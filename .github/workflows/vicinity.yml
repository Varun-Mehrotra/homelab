name: Vicinity CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/vicinity.yml"
      - "apps/vicinity/**"
      - "flux/vicinity/**"
      - "supabase/vicinity/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/vicinity.yml"
      - "apps/vicinity/**"
      - "flux/vicinity/**"
      - "supabase/vicinity/**"
  workflow_dispatch:

concurrency:
  group: vicinity-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: varun-mehrotra/vicinity
  APP_PATH: apps/vicinity

jobs:
  test:
    name: Test app
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/vicinity/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.APP_PATH }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ env.APP_PATH }}
        run: npm test

      - name: Build app
        working-directory: ${{ env.APP_PATH }}
        run: npm run build

  docker:
    name: Build and publish image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_PATH }}
          file: ${{ env.APP_PATH }}/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
