apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: flux-system
spec:
  interval: 30m0s
  releaseName: tailscale-operator
  targetNamespace: tailscale
  chart:
    spec:
      chart: tailscale-operator
      version: 1.98.3
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system
  install:
    createNamespace: false
  values:
    operatorConfig:
      defaultTags:
        - tag:k8s-operator
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
    proxyConfig:
      defaultTags: tag:k8s
