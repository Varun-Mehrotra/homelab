apiVersion: v1
kind: Service
metadata:
  name: grafana-tailnet
  namespace: monitoring
  annotations:
    tailscale.com/hostname: grafana
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: kube-prometheus-stack
  ports:
    - name: http-web
      port: 80
      targetPort: grafana
      protocol: TCP
