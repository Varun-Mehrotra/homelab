apiVersion: apps/v1
kind: Deployment
metadata:
  name: vicinity
  namespace: vicinity
  labels:
    app: vicinity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vicinity
  template:
    metadata:
      labels:
        app: vicinity
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: vicinity
          image: ghcr.io/varun-mehrotra/vicinity:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_GA_MEASUREMENT_ID
              valueFrom:
                secretKeyRef:
                  name: ga
                  key: measurement-id
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: SITE_URL
              value: "https://inyourvicinity.ca"
            - name: NEXT_PUBLIC_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vicinity-secrets
                  key: supabase-url
            - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: vicinity-secrets
                  key: supabase-anon-key
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vicinity-secrets
                  key: supabase-url
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: vicinity-secrets
                  key: supabase-anon-key
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: vicinity-secrets
                  key: supabase-service-role-key
            - name: GOOGLE_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: google-oauth-secrets
                  key: google-oauth-client-id
            - name: GOOGLE_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: google-oauth-secrets
                  key: google-oauth-client-secret
          startupProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
